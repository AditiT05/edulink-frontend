<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EduLink</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, #e3f2fd 0%, transparent 40%),
        radial-gradient(circle at 90% 20%, #f3e5f5 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, #e8f5e9 0%, transparent 40%),
        linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      overflow-x: hidden;
    }
    .bg-shape {
      position: fixed;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.6;
      z-index: -1;
    }
    .bg-shape-1 {
      background: #bbdefb;
      top: 80px;
      left: -100px;
    }
    .bg-shape-2 {
      background: #e1bee7;
      bottom: 100px;
      right: -120px;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 35px;
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .login-card h2 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .login-card p {
      text-align: center;
      font-size: 14px;
      margin-bottom: 25px;
      color: #555;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 30px;
      border: 2px solid #000;
      background: #fff;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: #000;
      color: #fff;
    }
    .form-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
    }
    .form-footer a {
      color: #000;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Login to continue to EduLink</p>
    <form onsubmit="loginUser(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>
    <div class="form-footer">
      Don’t have an account?
      <a href="register.html">Create account</a>
    </div>
  </div>
  <script>
    async function loginUser(event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const response = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (!response.ok) {
          alert(data.message || "Login failed");
          return;
        }
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.user.role);
        localStorage.setItem("userName", data.user.name);
        if (data.user.role === "student") {
          window.location.href = "student-dashboard.html";
        } else if (data.user.role === "teacher") {
          window.location.href = "teacher-dashboard.html";
        }
      } catch (error) {
        alert("Server error. Please try again.");
        console.error(error);
      }
    }
  </script>
</body>
</html>
