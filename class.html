<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduLink | Class</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#e3f2fd,#fce4ec,#e8f5e9);
}
.header{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  padding:18px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
}
.tabs{
  display:flex;
  gap:26px;
  padding:14px 28px;
  border-bottom:1px solid rgba(0,0,0,0.1);
}
.tabs button{
  background:none;
  border:none;
  cursor:pointer;
  font-size:15px;
  padding-bottom:8px;
  position:relative;
}
.tabs button.active{
  font-weight:600;
}
.tabs button.active::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:3px;
  background:#000;
  border-radius:10px;
}
.content{
  padding:28px;
}
.btn{
  padding:10px 18px;
  border-radius:20px;
  border:1px solid #000;
  background:#fff;
  cursor:pointer;
}
.btn:hover{
  background:#000;
  color:#fff;
}
.small-btn{
  padding:6px 14px;
  font-size:12px;
}
.square-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(420px, 1fr));
  gap:30px;
}
.square-card{
  background:#fff;
  border-radius:22px;
  padding:26px 28px;
  min-height:200px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 14px 36px rgba(0,0,0,0.08);
  transition:0.25s ease;
}
.square-card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 44px rgba(0,0,0,0.12);
}
.square-card h4{
  font-size:18px;
}
.square-card p{
  font-size:15px;
  color:#555;
  line-height:1.5;
}
.actions{
  display:flex;
  gap:10px;
}
.meet-card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
}
.meet-status {
  margin: 10px 0;
  font-weight: bold;
}
.meet-card input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}
.meet-card button {
  padding: 8px 14px;
  margin-right: 8px;
  cursor: pointer;
}
button.danger {
  background: #d9534f;
  color: white;
  border: none;
}
.people-item{
  display:flex;
  align-items:center;
  gap:14px;
  background:#fff;
  padding:8px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:12px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#e3f2fd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}
</style>
</head>
<body>
<div class="header">
  <div>
    <h2 id="classTitle">Class</h2>
    <span id="classSubject">EduLink Classroom</span>
  </div>
  <button class="btn" onclick="history.back()">Back</button>
</div>
<div class="tabs">
  <button class="active" onclick="loadTab('stream',this)">Stream</button>
  <button onclick="loadTab('assignments',this)">Assignments</button>
  <button onclick="loadTab('notes',this)">Notes</button>
  <button onclick="loadTab('meet',this)">Meet</button>
  <button onclick="loadTab('people',this)">People</button>
</div>
<div class="content" id="contentArea"></div>
<div id="meetContainer" style="height:600px;"></div>
<script src="https://meet.jit.si/external_api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const classId = params.get("id");
if (!classId) {
  alert("Invalid class link");
  window.location.href = "teacher-dashboard.html";
}
async function loadClassDetails() {
  try {
    const res = await fetch(`https://edulink-backend-modf.onrender.com/api/classes/${classId}`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });
    const cls = await res.json();
    document.getElementById("classTitle").innerText =
    `${cls.className} - ${cls.section}`;
    document.getElementById("classSubject").innerText =
    cls.subject;
  } catch (err) {
    console.error(err);
    alert("Failed to load class");
  }
}
loadClassDetails();
const contentArea = document.getElementById("contentArea");
function setActive(btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
function loadTab(tab, btn){
  setActive(btn);
  if(tab === "stream"){
    loadStream();
  }
  if(tab === "assignments"){
    loadAssignments();
  }
  if(tab === "notes"){
    loadNotes();
  }
  if(tab === "meet"){
    loadMeet();
  }
  if(tab === "people"){
    loadPeople();
  }
}
const role = localStorage.getItem("role"); 
async function loadStream() {
  try {
    const res = await fetch(`https://edulink-backend-modf.onrender.com/api/announcements/${classId}`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });
    const announcements = await res.json();
    let html = "";
    if (role === "teacher") {
      html += `
        <div class="square-card">
          <h4>Post Announcement</h4>
          <textarea id="announcementText" placeholder="Write something..." style="width:100%;height:90px;border-radius:12px;padding:10px;"></textarea>
          <div class="actions">
            <button class="btn small-btn" onclick="postAnnouncement()">Post</button>
          </div>
        </div>
      `;
    }
    html += `<div class="square-grid">`;
    announcements.forEach(a => {
      html += `
        <div class="square-card">
          <h4>${a.author}</h4>
          <p>${a.text}</p>
          <small>${new Date(a.createdAt).toLocaleString()}</small>
          <div class="actions">
            ${role === "teacher" ? `
              <button class="btn small-btn" onclick="editAnnouncement('${a._id}','${a.text.replace(/'/g,"\\'")}')">Edit</button>
              <button class="btn small-btn" onclick="deleteAnnouncement('${a._id}')">Delete</button>
            ` : ``}
          </div>
          <div style="margin-top:12px;">
            <b>Comments</b>
            ${a.comments.map(c => `
              <p style="margin-top:6px;font-size:14px;">
                <b>${c.author}:</b> ${c.text}
              </p>
            `).join("")}
            <input
              type="text"
              placeholder="Add comment..."
              style="margin-top:8px;width:100%;padding:8px;border-radius:10px;border:1px solid #ccc;"
              onkeydown="if(event.key==='Enter') addComment('${a._id}', this.value, this)"
            />
          </div>
        </div>
      `;
    });
    html += `</div>`;
    contentArea.innerHTML = html;
  } catch (err) {
    console.error(err);
    contentArea.innerHTML = "<p>Failed to load announcements</p>";
  }
}
async function postAnnouncement() {
  const text = document.getElementById("announcementText").value;
  if (!text) return;
  await fetch(`https://edulink-backend-modf.onrender.com/api/announcements/${classId}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ text })
  });
  loadStream();
}
async function editAnnouncement(id, oldText) {
  const newText = prompt("Edit announcement", oldText);
  if (!newText) return;
  await fetch(`https://edulink-backend-modf.onrender.com/api/announcements/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ text: newText })
  });
  loadStream();
}
async function deleteAnnouncement(id) {
  if (!confirm("Delete this announcement?")) return;
  await fetch(`https://edulink-backend-modf.onrender.com/api/announcements/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });
  loadStream();
}
async function addComment(announcementId, text, inputEl) {
  if (!text) return;
  await fetch(`https://edulink-backend-modf.onrender.com/api/announcements/${announcementId}/comments`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ text })
  });
  inputEl.value = "";
  loadStream();
}
async function loadAssignments() {
  try {
    const res = await fetch(`https://edulink-backend-modf.onrender.com/api/assignments/${classId}`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });
    const assignments = await res.json();
    let html = "";
    if (role === "teacher") {
      html += `
        <div class="square-card">
          <h4>Upload Assignment</h4>
          <input id="aTitle" placeholder="Title"
            style="width:100%;padding:10px;margin-bottom:8px;border-radius:10px;border:1px solid #ccc;">
          <textarea id="aDesc" placeholder="Description"
            style="width:100%;height:70px;padding:10px;border-radius:10px;border:1px solid #ccc;"></textarea>
          <input type="date" id="aDue"
            style="margin-top:8px;padding:8px;border-radius:10px;border:1px solid #ccc;">
          <input type="file" id="aFile" style="margin-top:8px;">
          <div class="actions" style="margin-top:10px;">
            <button class="btn small-btn" onclick="uploadAssignment()">Upload</button>
          </div>
        </div>
      `;
    }
    html += `<div class="square-grid">`;
    assignments.forEach(a => {
      html += `
      <div class="square-card">
      <h4>${a.title}</h4>
      <p>${a.description || ""}</p>
      <small>Due: ${new Date(a.dueDate).toDateString()}</small>
      <div class="actions" style="margin-top:12px;">
        <a class="btn small-btn" href="http://localhost:5000/${a.fileUrl}" download>
          Download
        </a>
        ${
          role === "teacher"
            ? `<button class="btn small-btn" onclick="deleteAssignment('${a._id}')">Delete</button>`
            : ""
        }
      </div>
      <!-- STUDENT SUBMISSION SECTION -->
      ${
        role === "student"
          ? `
          <div style="margin-top:15px;">
            <input type="file" id="submissionFile-${a._id}" />
            <button class="btn small-btn"
              onclick="submitAssignment('${a._id}')">
              Submit Assignment
            </button>
          </div>
        `
          : ""
      }
      <!-- TEACHER VIEW SUBMISSIONS -->
      ${
        role === "teacher"
          ? `
          <div style="margin-top:15px;">
            <button class="btn small-btn"
              onclick="loadSubmissions('${a._id}', this)">
              View Submissions
            </button>
            <div id="submissionList-${a._id}" style="margin-top:10px;"></div>
          </div>
          `: ""
      }
    </div>
  `;
});
    html += `</div>`;
    contentArea.innerHTML = html;
  } catch (err) {
    console.error(err);
    contentArea.innerHTML = "<p>Failed to load assignments</p>";
  }
}
async function submitAssignment(assignmentId) {
  const fileInput = document.getElementById(`submissionFile-${assignmentId}`);
  const file = fileInput.files[0];
  if (!file) {
    alert("Please select a file");
    return;
  }
  const formData = new FormData();
  formData.append("file", file);
  await fetch(`https://edulink-backend-modf.onrender.com/api/submissions/${assignmentId}`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: formData
  });
  alert("Assignment submitted successfully!");
  fileInput.value = "";
}
async function loadSubmissions(assignmentId, btn) {
  const container = document.getElementById(`submissionList-${assignmentId}`);
  const res = await fetch(`https://edulink-backend-modf.onrender.com/api/submissions/${assignmentId}`, {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });
  const submissions = await res.json();
  if (submissions.length === 0) {
    container.innerHTML = "<p>No submissions yet.</p>";
    return;
  }
  let html = "";
  submissions.forEach(s => {
    html += `
      <div style="margin-bottom:8px;">
        <strong>${s.studentName}</strong><br>
        <a href="http://localhost:5000/${s.fileUrl}" download>
          Download Submission
        </a>
        <br>
        <small>${new Date(s.submittedAt).toLocaleString()}</small>
      </div>
    `;
  });
  container.innerHTML = html;
}
async function uploadAssignment() {
  const formData = new FormData();
  formData.append("title", document.getElementById("aTitle").value);
  formData.append("description", document.getElementById("aDesc").value);
  formData.append("dueDate", document.getElementById("aDue").value);
  formData.append("file", document.getElementById("aFile").files[0]);
  await fetch(`https://edulink-backend-modf.onrender.com/api/assignments/${classId}`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: formData
  });
  loadAssignments();
}
async function deleteAssignment(id) {
  if (!confirm("Delete this assignment?")) return;
  await fetch(`https://edulink-backend-modf.onrender.com/api/assignments/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });
  loadAssignments();
}
async function loadNotes() {
  try {
    const res = await fetch(`https://edulink-backend-modf.onrender.com/api/notes/${classId}`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });
    const notes = await res.json();
    let html = "";
    if (role === "teacher") {
      html += `
        <div class="square-card">
          <h4>Upload Notes</h4>
          <input id="noteTitle" type="text" placeholder="Notes title"
            style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-bottom:10px;" />
          <input id="noteFile" type="file"
            style="margin-bottom:10px;" />
          <div class="actions">
            <button class="btn small-btn" onclick="uploadNotes()">Upload</button>
          </div>
        </div>
      `;
    }
    html += `<div class="square-grid">`;
    notes.forEach(n => {
      html += `
        <div class="square-card">
          <h4>${n.title}</h4>
          <p>Uploaded by: ${n.uploadedBy}</p>
          <small>${new Date(n.createdAt).toLocaleString()}</small>
          <div class="actions">
            <a class="btn small-btn"
              href="http://localhost:5000/uploads/${n.file}"
              download>
              Download
            </a>
            ${role === "teacher" ? `
              <button class="btn small-btn"
                onclick="deleteNotes('${n._id}')">
                Delete
              </button>
            ` : ``}
          </div>
        </div>
      `;
    });
    html += `</div>`;
    contentArea.innerHTML = html;
  } catch (err) {
    console.error(err);
    contentArea.innerHTML = "<p>Failed to load notes</p>";
  }
}
async function uploadNotes() {
  const title = document.getElementById("noteTitle").value;
  const file = document.getElementById("noteFile").files[0];
  if (!title || !file) {
    alert("Title and file required");
    return;
  }
  const formData = new FormData();
  formData.append("title", title);
  formData.append("file", file);
  await fetch(`https://edulink-backend-modf.onrender.com/api/notes/${classId}`, {
    method: "POST",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    },
    body: formData
  });
  loadNotes();
}
async function deleteNotes(noteId) {
  if (!confirm("Delete this note?")) return;
  await fetch(`https://edulink-backend-modf.onrender.com/api/notes/${noteId}`, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });
  loadNotes();
}
const API_BASE = "https://edulink-backend-modf.onrender.com/api/meet";
const token = localStorage.getItem("token");
async function loadMeet() {
  contentArea.innerHTML = "<p>Loading Meet...</p>";
  try {
    const res = await fetch(`https://edulink-backend-modf.onrender.com/api/meet/${classId}`, {
      headers: { Authorization: "Bearer " + localStorage.getItem("token") }
    });
    const data = await res.json();
    let html = `<div class="square-card"><h3>Class Meet</h3>`;
    if (data && data.isActive) {
      html += `<p>Meeting is live </p>
               <a href="${data.meetLink}" target="_blank" class="btn">Join Meet</a>`;
    } else {
      html += `<p>No active meeting</p>`;
    }
    if (role === "teacher") {
      html += `<input type="text" id="meetLinkInput" placeholder="Paste Google Meet link"
                 style="margin-top:10px;width:100%;padding:8px;border-radius:10px;" />
               <button class="btn" onclick="createMeet()">Start / Update Meet</button>
               <button class="btn danger" onclick="endMeet()">End Meet</button>`;
    }
    html += "</div>";
    contentArea.innerHTML = html;
  } catch (err) {
    console.error(err);
    contentArea.innerHTML = "<p>Failed to load meet</p>";
  }
}
async function createMeet() {
  const meetLink = document.getElementById("meetLinkInput").value;
  if (!meetLink) { alert("Please enter meet link"); return; }
  await fetch(`${API_BASE}/${classId}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ meetLink })
  });
  alert("Meet link updated");
  loadMeet(); 
}
async function endMeet() {
  if (!confirm("End the meeting?")) return;
  await fetch(`${API_BASE}/${classId}`, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${token}` }
  });
  alert("Meeting ended");
  loadMeet(); 
}
function startMeeting(roomName) {
  const domain = "meet.jit.si";
  const options = {
    roomName: roomName,
    width: "100%",
    height: 600,
    parentNode: document.querySelector("#meetContainer"),
  };
  new JitsiMeetExternalAPI(domain, options);
}
async function loadPeople() {
  contentArea.innerHTML = "<p>Loading people...</p>";
  try {
    const res = await fetch(`https://edulink-backend-modf.onrender.com/api/classes/${classId}/people`, {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });
    const data = await res.json();
    let html = `
      <h3 style="margin-bottom:15px;">Teacher</h3>
      <div class="people-item">
        <div class="avatar">${data.teacher.name.charAt(0)}</div>
        <div>
          <strong>${data.teacher.name}</strong><br>
          <small>${data.teacher.email}</small>
        </div>
      </div>
      <h3 style="margin:25px 0 15px;">Students (${data.students.length})</h3>
    `;
    data.students.forEach(student => {
      html += `
        <div class="people-item">
          <div class="avatar">${student.name.charAt(0)}</div>
          <div>
            <strong>${student.name}</strong><br>
            <small>${student.email}</small>
          </div>
        </div>
      `;
    });
    contentArea.innerHTML = html;
  } catch (err) {
    console.error(err);
    contentArea.innerHTML = "<p>Failed to load people</p>";
  }
}
loadTab("stream", document.querySelector(".tabs button.active"));
</script>
</body>
</html>
