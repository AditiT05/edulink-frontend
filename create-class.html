<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduLink | Create Class</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}
body{
  min-height:100vh;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec,#e8f5e9);
  display:flex;
  align-items:center;
  justify-content:center;
}
.create-class-card{
  background:rgba(255,255,255,0.95);
  width:420px;
  max-width:90%;
  border-radius:22px;
  padding:26px;
  box-shadow:0 18px 45px rgba(0,0,0,0.12);
}
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.card-header h2{
  font-size:22px;
}
.close-btn{
  font-size:22px;
  cursor:pointer;
}
.form-group{
  margin-bottom:16px;
}
.form-group label{
  font-size:13px;
  color:#555;
  display:block;
  margin-bottom:6px;
}
.form-group input{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid #ccc;
}
.actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:20px;
}
.btn{
  padding:10px 22px;
  border-radius:22px;
  border:1px solid #000;
  background:#fff;
  cursor:pointer;
}
.btn.primary{
  background:#000;
  color:#fff;
}
.info{
  margin-top:18px;
  font-size:12px;
  color:#666;
}
</style>
</head>
<body>
<div class="create-class-card">
  <div class="card-header">
    <h2>Create class</h2>
    <span class="close-btn" onclick="goBack()">✕</span>
  </div>
  <div class="form-group">
    <label>Class name (required)</label>
    <input type="text" id="className" placeholder="e.g. TY CS A">
  </div>
  <div class="form-group">
    <label>Section</label>
    <input type="text" id="section" placeholder="e.g. A / B">
  </div>
  <div class="form-group">
    <label>Subject</label>
    <input type="text" id="subject" placeholder="e.g. Data Science">
  </div>
  <div class="actions">
    <button class="btn" onclick="goBack()">Cancel</button>
    <button class="btn primary" onclick="createClass()">Create</button>
  </div>
  <div class="info">
    Students will be able to join this class using a class code.
  </div>
</div>
<script>
const role = localStorage.getItem("role");
const token = localStorage.getItem("token");
if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}
if (role !== "teacher") {
  alert("Only teachers are allowed to create classes.");
  window.location.href = "student-dashboard.html";
}
function goBack(){
  window.location.href = "teacher-dashboard.html";
}
async function createClass(){
  const className = document.getElementById("className").value.trim();
  const section   = document.getElementById("section").value.trim();
  const subject   = document.getElementById("subject").value.trim();
  if(className === ""){
    alert("Class name is required");
    return;
  }
  try{
    const res = await fetch("https://edulink-backend-modf.onrender.com/api/classes/create", {
    method: "POST",
    headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token   
    },
    body: JSON.stringify({ className, section, subject })
  });
    const data = await res.json();
    if (!res.ok) {
    alert(data.message || "Failed to create class");
    return;
    }
    alert("Class created successfully!\nClass Code: " + data.classCode);

    window.location.href = "teacher-dashboard.html";
  }catch(err){
    alert("Server error. Please try again.");
    console.error(err);
  }
}
</script>
</body>
</html>
